models:
  - name: test_generate_dimension_type2
    description: >
      Validates generate_dimension() for a Type-2 (SCD2 snapshot-sourced)
      dimension, using a composite business_key (natural key + dbt_valid_from)
      so the surrogate key is unique per historical row, not just per customer.
    tests:
      - clearpoint_dbt_utils.one_current_record_per_key:
          arguments:
            business_key: customer_id
      - clearpoint_dbt_utils.no_overlapping_scd2_periods:
          arguments:
            business_key: customer_id
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: _is_current
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
